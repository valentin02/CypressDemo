name: Run Cypress Tests

on:
  workflow_dispatch:   # запуск вручну кнопкою в Actions

jobs:
  cypress-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------
      # CACHE: npm dependencies
      # Кешує ~/.npm на основі package-lock.json
      # ----------------------------
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # ----------------------------
      # CACHE: Cypress binary (~200+ MB)
      # Кешує директорію з бінарником Cypress
      # ----------------------------
      - name: Cache Cypress
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-cypress-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-cypress-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'   # додатково увімкне вбудований кеш npm у setup-node

      # Використовуємо npm ci (швидше та детермінованіше для CI)
      - name: Install dependencies
        run: npm ci

      # Запуск конкретного спека
      - name: Run Cypress tests
        run: npx cypress run --spec "cypress/e2e/OzanKaraliMedium/openOzanKarali.cy.js"

      # (необов'язково) завантажити відео/скріншоти як артефакти при фейлі
      - name: Upload Cypress videos
        if: failure() || always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos
          if-no-files-found: ignore

      - name: Upload Cypress screenshots
        if: failure() || always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore